<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f0f2f5; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); width: 100%; max-width: 360px; }
        h2 { text-align: center; color: #333; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #42b72a; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #36a420; }
        .error { color: #d32f2f; text-align: center; margin-top: 8px; display: none; }
        .success { color: #2e7d32; text-align: center; margin-top: 8px; display: none; }
        .link { text-align: center; margin-top: 12px; }
        a { color: #1877f2; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Register</h2>
        <form id="registerForm">
            <input type="text" id="firstName" placeholder="First Name" required>
            <input type="text" id="lastName" placeholder="Last Name" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Register</button>
            <div class="error" id="errorMsg">Registration failed</div>
            <div class="success" id="successMsg">Registration successful! Redirecting...</div>
        </form>
        <div class="link">Already have an account? <a href="/login">Login</a></div>
    </div>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            try {
                const res = await fetch('/api/v1/customers', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        firstName: document.getElementById('firstName').value,
                        lastName: document.getElementById('lastName').value,
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                if (!res.ok) { errorMsg.style.display = 'block'; return; }
                successMsg.style.display = 'block';
                setTimeout(() => window.location.href = '/login', 1500);
            } catch { errorMsg.style.display = 'block'; }
        });
    </script>
</body>
</html>
