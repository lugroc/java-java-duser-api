server:
  port: 8765

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: customer
          uri: lb://customer
          predicates:
            - Path=/api/v1/customers/**,/api/v1/sessions/**
        - id: fraud
          uri: lb://fraud
          predicates:
            - Path=/api/v1/fraud-check/**
        - id: inventory
          uri: lb://inventory
          predicates:
            - Path=/api/v1/products/**
        - id: notification
          uri: lb://notification
          predicates:
            - Path=/api/v1/notifications/**

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka
    fetchRegistry: true
    registerWithEureka: true
